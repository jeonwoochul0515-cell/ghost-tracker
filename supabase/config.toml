# Supabase 로컬/배포 공용 설정 (supabase init 결과물의 미니멀 버전)
project_id = "ghost-tracker"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/admin"]
jwt_expiry = 3600
enable_signup = false  # admin 만 매직링크로 등록

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"

# Edge Functions 함수별 설정 — verify_jwt 는 함수마다 명시.
[functions.submit-report]
verify_jwt = false

[functions.ingest-eat]
verify_jwt = false

[functions.ingest-nts]
verify_jwt = false

[functions.normalize-addresses]
verify_jwt = false

[functions.recompute-clusters]
verify_jwt = false
