name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Type check
        run: npm run typecheck
      - name: Tests
        run: npm run test
      - name: Build
        run: npm run build
