name: Deploy

on:
  push:
    branches: [main, master]

jobs:
  # 1. 타입체크·테스트 통과 시에만 다음 단계로
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test

  # 2. Supabase 마이그레이션 + Edge Functions 배포 (선택, secrets 없으면 자동 skip)
  supabase:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ vars.HAS_SUPABASE_SECRETS == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations
        run: supabase db push
      - name: Deploy functions
        run: |
          supabase functions deploy submit-report
          supabase functions deploy ingest-eat
          supabase functions deploy ingest-nts
          supabase functions deploy normalize-addresses
          supabase functions deploy recompute-clusters

  # 3. Cloudflare Pages 배포 — push 시 자동
  cloudflare:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          VITE_USE_MOCK: ${{ vars.VITE_USE_MOCK || 'true' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ghost-tracker --branch=main --commit-dirty=true
